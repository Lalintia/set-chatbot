name: Deploy to EC2

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: 54.169.168.58
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "index.html"
          target: "/var/www/set-chatbot/"
          overwrite: true

      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: 54.169.168.58
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: echo "Deployed successfully at $(date)"
